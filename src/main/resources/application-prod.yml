spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/desofs
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12

jwt:
  secret: change_this_to_a_long_random_secret_for_dev_purposes_only
  expiration-ms: 900000 # 15 minutes

  # 7 days for refresh tokens
  refresh-expiration-ms: 604800000

app:
  attachments:
    storage-dir: uploads/attachments
    max-file-size: 25MB
    allowed-extensions:
      - pdf
      - doc
      - docx
      - xls
      - xlsx
      - ppt
      - pptx
      - jpg
      - jpeg
      - png
      - gif
    max-uploads-per-window: 10
    upload-window: 1h
    max-image-pixels: 40000000
