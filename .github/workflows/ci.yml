name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Cache dependency-check data
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: dependency-check-data-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            dependency-check-data-${{ runner.os }}-

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Build and run tests
        run: mvn -B clean test

      - name: Dependency scan
        run: mvn -B -DskipTests -DdataDirectory=.dependency-check-data org.owasp:dependency-check-maven:check

      - name: Static analysis
        run: mvn -B -DskipTests com.github.spotbugs:spotbugs-maven-plugin:check
