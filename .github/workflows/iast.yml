name: IAST (Interactive Security Testing)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  iast:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and package
        run: mvn -B package -DskipTests

      - name: Download IAST agent (Contrast Community)
        run: |
          curl -L -o contrast-agent.jar \
            https://pkg.contrastsecurity.com/artifactory/libs-release/com/contrastsecurity/contrast-agent/latest/contrast-agent.jar

      - name: Start Database
        run: docker compose up -d

      - name: Wait for database to be ready
        run: sleep 15

      - name: Start app WITH instrumentation agent
        run: |
          java -javaagent:contrast-agent.jar \
               -Dcontrast.application.name=desofs-app \
               -jar target/desofs-app-0.1.0.jar &

      - name: Wait for application to be ready
        run: sleep 20

      - name: Run ZAP to drive traffic (triggers IAST)
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:8080'
          fail_action: false

      - name: Collect IAST results
        run: cat contrast-agent.log || echo "Check agent output above"

      - name: Stop infrastructure
        if: always()
        run: docker compose down