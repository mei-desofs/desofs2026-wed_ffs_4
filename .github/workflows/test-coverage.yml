name: Test Coverage & Reporting

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests with coverage
        run: mvn -B clean test jacoco:report -Dspring.profiles.active=test

      - name: Check coverage threshold
        run: |
          LINE=$(grep -oP '<counter type="LINE" missed="\d+" covered="\d+"/>' target/site/jacoco/jacoco.xml | tail -1)

          MISSED=$(echo "$LINE" | grep -oP 'missed="\K\d+')
          COVERED=$(echo "$LINE" | grep -oP 'covered="\K\d+')

          COVERAGE=$(echo "scale=4; $COVERED / ($COVERED + $MISSED)" | bc -l)

          echo "Code Coverage: $COVERAGE"

          THRESHOLD=0.70
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "Coverage below threshold ($THRESHOLD)!"
            exit 1
          fi

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: target/surefire-reports/